# Tech resume overrides
# This file is merged on top of metadata.toml via src/meta.typ::makeMeta().
# Only add keys here that differ from the base resume.

[modules]
experience_file = "work-experience.toml"
projects_file = "tech-projects.toml"

[lang.en]
header_quote = "IT enthusiast with hands-on experience in Linux administration, virtualization, networking, and AI/LLM automation."
cv_footer = "Technical Resume"

[layout]
before_entry_description_skip = "-4pt"

[layout.header]
display_profile_photo = false

[layout.entry]
# Show project/role title first (bold), then organization underneath
display_entry_society_first = false
display_logo = false

[personal.info]
email = "tech@finnrut.is"
github = "Multipixelone"
location = "NYC"
# don't show things that aren't relevant here
height = ""
instagram = ""
vocal-part = ""
union = ""
