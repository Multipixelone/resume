title = "Content Pipelines & Declarative Infrastructure"
company = "Personal Project"
date = "Nov 2016 – Present"
location = ""
summary = "The content I ship, this resume included, goes through pipelines I built myself, and the infrastructure underneath is defined in NixOS so it's reproducible from scratch. At home that means dozens of internet-facing services running on VMware ESXi, KVM, and Docker, all managed with NixOS and Flakes so I can rebuild a machine and get exactly what I had before. The same declarative approach keeps content pipelines predictable: the same input produces the same output, every time."
