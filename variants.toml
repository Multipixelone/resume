# Resume variant registry — single source of truth.
# packages/resume.nix, packages/checks.nix, and .github/workflows/_build.yml
# all read from this file. To add a new variant, add a section here and
# create the corresponding .typ file (and optional override TOML).
#
# Fields:
#   source          — stem of the .typ file in resumes/ (required)
#   dest            — output filename stem (without extension) for built artifacts and pages deploy (required)
#   expected_pages  — exact page count for the PDF check; 0 = multi-page (>= 1) (required)
#   check_metadata  — whether the variant's merged metadata is checked for completeness (required)
#   override_toml   — override TOML filename in metadata/ (optional; omit for base-only variants)
#   title           — display title on the site card (optional; omit if site_hidden)
#   subtitle        — display subtitle on the site card (optional; omit if site_hidden)
#   site_hidden     — hide this variant from the site (optional; defaults to false)

[cv]
source = "cv"
dest = "resume"
expected_pages = 1
check_metadata = true
title = "Artistic Resume"
subtitle = "Theatre & performance"

