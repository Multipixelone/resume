    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "linotype-sabon", Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.75;
      color: var(--ink);
      background: var(--paper)
        radial-gradient(ellipse at top, rgba(255, 255, 255, 0.6), transparent 60%);
      background-attachment: fixed;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      font-variant-ligatures: common-ligatures;
      text-rendering: optimizeLegibility;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: var(--paper)
          radial-gradient(ellipse at top, rgba(255, 255, 255, 0.04), transparent 60%);
      }
    }

    ::selection { background: var(--selection-bg); color: var(--ink); }

    a {
      color: var(--accent);
      text-underline-offset: 0.12em;
      text-decoration-thickness: 1px;
      transition: color 0.15s ease;
    }
    a:hover { color: var(--accent-hover); }

    header {
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.75rem;
      padding-bottom: 2rem;
      position: relative;
    }
    header::after {
      content: "\2766";
      position: absolute;
      left: 50%;
      bottom: -0.6em;
      transform: translateX(-50%);
      padding: 0.1em 0.75rem;
      background: var(--paper);
      color: var(--accent);
      font-family: "Cooper*", Georgia, serif;
      font-weight: 400;
      font-size: 1.15rem;
      line-height: 1;
    }

    header h1 {
      font-family: "Cooper*", Georgia, serif;
      font-weight: 700;
      font-size: 2.6rem;
      line-height: 1.05;
      letter-spacing: 0;
      margin: 0 0 0.4rem;
      text-wrap: balance;
    }

    header .pronouns {
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
      margin-bottom: 0.75rem;
    }

    header .tagline {
      font-family: "linotype-sabon", Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 36em;
      margin: 0 auto;
    }

    main { margin-bottom: 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--paper-shade);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: color 0.15s ease, background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }

    .card a {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card .preview {
      background: var(--paper);
      aspect-ratio: 8.5 / 11;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .card .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card .preview .placeholder {
      font-family: "Cooper*", Georgia, serif;
      font-size: 1.3rem;
      color: var(--muted);
      text-align: center;
      padding: 1rem;
      font-variant: small-caps;
      letter-spacing: 0.06em;
    }

    .card .info {
      padding: 0.85rem 1rem 1rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card .info .title {
      font-family: "linotype-sabon", Georgia, serif;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--ink);
      line-height: 1.3;
      transition: color 0.15s ease;
    }
    .card:hover .info .title { color: var(--accent); }

    .card .info .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.2rem;
      font-variant: small-caps;
      letter-spacing: 0.04em;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      font-size: 0.9rem;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
    }
    footer a:hover {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    @media (max-width: 600px) {
      body { font-size: 17px; padding: 1.25rem 1rem 2rem; }
      header h1 { font-size: 2rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Finn Rutis</h1>
    <div class="pronouns">they / them</div>
    <p class="tagline">Musical theatre performer &amp; voiceover artist interested in illuminating unconscious parts of the human experience.</p>
  </header>

  <main>
    <div class="grid">
      <!-- VARIANT_CARDS -->

      <div class="card">
        <a href="FINN RUTIS.pdf">
          <div class="preview"><div class="placeholder">PDF</div></div>
          <div class="info">
            <div class="title">Headshot Composite</div>
            <div class="subtitle">CV &amp; portrait</div>
          </div>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <a href="https://github.com/Multipixelone/resume">Source on GitHub</a>
  </footer>
</body>
</html>
