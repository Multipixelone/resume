name: Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: create release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Read current version
        id: current
        run: |
          version="$(tr -d '\n' < VERSION)"
          if [ -z "$version" ]; then
            echo "::error::Failed to read version from VERSION"
            exit 1
          fi
          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid semver format in VERSION: $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag does not already exist
        run: |
          if git ls-remote --tags --exit-code origin "refs/tags/v${{ steps.next.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.next.outputs.version }} already exists"
            exit 1
          fi

      - name: Write new version
        run: echo "${{ steps.next.outputs.version }}" > VERSION

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --verbose --tag v${{ steps.next.outputs.version }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: release/v${{ steps.next.outputs.version }}
          commit-message: "chore(release): v${{ steps.next.outputs.version }}"
          title: "chore(release): v${{ steps.next.outputs.version }}"
          body: "Automated release PR for v${{ steps.next.outputs.version }}."
          labels: automerge
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: squash
