name: CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: build artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - run: |
          sudo mkdir /nix
      - run: |
          sudo chown root:root /nix
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            fallback = true
            http-connections = 128
            max-substitution-jobs = 128
            connect-timeout = 15
            stalled-download-timeout = 15
            download-attempts = 100
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build site
        run: |
          nix build .#packages.x86_64-linux.website -o ./result-website
      - name: Prepare pages artifact
        run: |
          mkdir -p ./pages
          cp -R ./result-website/. ./pages/
      - name: Build resume
        run: |
          nix build .#packages.x86_64-linux.resume -o ./result-resume
      - name: Add resume PNG to pages artifact
        run: |
          shopt -s nullglob
          png_files=(./result-resume/CV_FinnRutis_*.png)
          if [ "${#png_files[@]}" -ne 1 ]; then
            echo "Expected exactly 1 resume PNG file, but found ${#png_files[@]}."
            exit 1
          fi
          cp "${png_files[0]}" ./pages/resume.png
          pdf_files=(./result-resume/CV_FinnRutis_*.pdf)
          mkdir -p ./resume
          cp "${pdf_files[0]}" ./pages/resume.pdf
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages
      - name: Upload resume PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: ./resume

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
